<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PowerFuel | Suplementos Deportivos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0e0e0e;color:#fff}

/* TOPBAR */
.topbar{
  background:#000;
  padding:8px 20px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
  border-bottom:1px solid rgba(255,255,255,.05)
}
.topbar a{color:#00ff88;text-decoration:none;margin-left:20px}

/* HEADER */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(10px)
}
.header-inner{
  padding:18px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center
}
.logo{font-size:26px;font-weight:700;color:#00ff88}

/* HERO */
.hero{
  min-height:90vh;
  background:
    linear-gradient(to right,rgba(0,0,0,.88),rgba(0,0,0,.35)),
    url('https://images.unsplash.com/photo-1599058917212-d750089bc07a') center/cover;
  display:flex;
  align-items:center;
  padding:0 20px
}
.hero-content{max-width:650px}
.hero h1{font-size:48px;line-height:1.1}
.hero h1 span{color:#00ff88}
.hero p{margin-top:15px;opacity:.9}

/* BENEFITS */
.benefits{
  margin-top:35px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px
}
.benefit{
  display:flex;
  gap:15px;
  align-items:flex-start;
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp .6s ease forwards
}
.benefit:nth-child(1){animation-delay:.2s}
.benefit:nth-child(2){animation-delay:.4s}
.benefit:nth-child(3){animation-delay:.6s}
.benefit:nth-child(4){animation-delay:.8s}

.benefit i{font-size:26px;color:#00ff88}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0)}
}

/* PRODUCTS */
.products{padding:60px 20px}
.products h2{font-size:34px;margin-bottom:35px}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px
}
.card{
  background:#161616;
  border-radius:14px;
  padding:18px;
  transition:.3s
}
.card:hover{transform:translateY(-6px)}
.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px
}

.product-name{
  font-size:18px;
  font-weight:600;
  margin:12px 0 6px;
}

.price-old{text-decoration:line-through;opacity:.5;font-size:14px}
.price-new{color:#00ff88;font-size:22px;margin:6px 0}

.qty{
  display:flex;
  align-items:center;
  gap:10px;
  margin:10px 0
}
.qty button{
  width:30px;height:30px;
  border:none;border-radius:50%;
  background:#222;color:#fff;
  cursor:pointer
}

.card button{
  width:100%;
  padding:12px;
  background:#00ff88;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer
}

/* CART */
.cart{
  position:fixed;
  right:-380px;top:0;
  width:350px;height:100vh;
  background:#000;padding:25px;
  transition:.35s;z-index:300
}
.cart.active{right:0}

.cart-icon{
  position:fixed;
  right:20px;bottom:20px;
  width:55px;height:55px;
  background:#00ff88;color:#000;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;font-size:22px;
  cursor:pointer;z-index:400
}

/* LOGIN */
.login-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:500
}
.login-modal.active{display:flex}

.login-box{
  background:#111;
  padding:30px;
  width:320px;
  border-radius:14px;
  text-align:center
}
.login-box input{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  background:#222;
  border:none;
  border-radius:6px;
  color:#fff
}
.login-box button{
  width:100%;
  padding:12px;
  background:#00ff88;
  border:none;
  border-radius:6px;
  font-weight:600;
  cursor:pointer
}
.login-box span{
  display:block;
  margin-top:12px;
  opacity:.7;
  cursor:pointer
}
</style>
</head>

<body>

<div class="topbar">
  <span><i class="fa-solid fa-truck"></i> Envíos a todo el país</span>
  <div>
    <a href="#" onclick="openLogin()"><i class="fa-regular fa-user"></i> Iniciar sesión</a>
    <a href="#" onclick="toggleCart()"><i class="fa-solid fa-cart-shopping"></i></a>
  </div>
</div>

<header>
  <div class="header-inner">
    <div class="logo">PowerFuel</div>
  </div>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Construí tu <span>mejor versión</span></h1>
    <p>Suplementos premium con envío a todo el país</p>

    <div class="benefits">
      <div class="benefit"><i class="fa-solid fa-dumbbell"></i> Rendimiento real</div>
      <div class="benefit"><i class="fa-solid fa-bolt"></i> Más energía</div>
      <div class="benefit"><i class="fa-solid fa-shield-halved"></i> Compra segura</div>
      <div class="benefit"><i class="fa-solid fa-location-dot"></i> Envíos rápidos</div>
    </div>
  </div>
</section>

<section class="products">
  <h2>Ofertas destacadas</h2>
  <div class="grid" id="productGrid"></div>
</section>

<div class="cart" id="cart">
  <h3>Tu carrito</h3>
  <ul id="cartItems"></ul>
  <p>Total: $<span id="total">0</span></p>
</div>

<div class="cart-icon" onclick="toggleCart()">
  <i class="fa-solid fa-cart-shopping"></i>
</div>

<div class="login-modal" id="loginModal">
  <div class="login-box">
    <h3>Iniciar sesión</h3>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
    <span onclick="closeLogin()">Cancelar</span>
  </div>
</div>

<script>
const products=[
  {name:'Proteína Whey Gold 907g',price:25000,img:'https://i.postimg.cc/1X4CNNMy/IMG-7950.webp'},
  {name:'Creatina Monohidratada',price:18000,img:'https://i.postimg.cc/Y9vDvWdF/IMG-7951.jpg'}
];

let cart=[];
let total=0;

const grid=document.getElementById('productGrid');

products.forEach((p,i)=>{
  grid.innerHTML+=`
  <div class="card">
    <img src="${p.img}">
    <div class="product-name">${p.name}</div>
    <div class="price-new">$${p.price}</div>
    <button onclick="addToCart(${i})">
      <i class="fa-solid fa-cart-plus"></i> Agregar
    </button>
  </div>`;
});

function addToCart(i){
  cart.push(products[i]);
  renderCart();
}

function renderCart(){
  const list=document.getElementById('cartItems');
  list.innerHTML='';
  total=0;
  cart.forEach((p,i)=>{
    total+=p.price;
    list.innerHTML+=`
      <li>
        ${p.name} - $${p.price}
        <button onclick="removeItem(${i})" style="background:none;border:none;color:red">
          <i class="fa-solid fa-trash"></i>
        </button>
      </li>`;
  });
  document.getElementById('total').innerText=total;
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
}

function toggleCart(){
  document.getElementById('cart').classList.toggle('active');
}

function openLogin(){
  document.getElementById('loginModal').classList.add('active');
}
function closeLogin(){
  document.getElementById('loginModal').classList.remove('active');
}
function login(){
  alert('Sesión iniciada (demo)');
  closeLogin();
}
</script>

</body>
</html>
